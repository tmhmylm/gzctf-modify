services:
  gzctf:
    image: gztime/gzctf:latest
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /opt/gzctf/data:/app/files
      - /opt/gzctf/appsettings.json:/app/appsettings.json:ro
      - /opt/gzctf/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - db
    networks:
      - gzctf-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=gzctf_db_password
      - POSTGRES_DB=gzctf
    volumes:
      - /opt/gzctf/db:/var/lib/postgresql/data
    networks:
      - gzctf-network

networks:
  gzctf-network:
    driver: bridge
